name: Patch README for GitHub
on: push

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sed -i 's|git+ssh://git@ghe.spotify.net/architg/flaude.git|git+https://github.com/architg25/flaude.git|g' README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git commit -am "Update README URLs for GitHub" && git push)
